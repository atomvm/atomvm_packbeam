name: Build and Test

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: "ubuntu-24.04"
    permissions:
      contents: read
      pull-requests: read
    strategy:
      matrix:
        otp: ["25", "26", "27"]

    steps:
    # Setup
    - name: "Checkout repo"
      uses: actions/checkout@v2
      with:
        submodules: 'recursive'

    - uses: erlef/setup-beam@5304e04ea2b355f03681464e683d92e3b2f18451
      with:
        otp-version: ${{ matrix.otp }}

    # Builder info
    - name: "System info"
      run: |
        echo "**uname:**"
        uname -a
        echo "**OTP version:**"
        cat $(dirname $(which erlc))/../releases/RELEASES || true

    - name: "Install deps"
      run: |
        sudo apt install -y make git

    - name: "Build rebar3"
      run: |
        cd /tmp
        git clone https://github.com/erlang/rebar3.git
        cd rebar3
        ./bootstrap

    # Build
    - name: "Make"
      run: PATH="/tmp/rebar3:${PATH}" make
